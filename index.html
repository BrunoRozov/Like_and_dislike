<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <title>Like and dislike</title>
</head>

<body>
    <header>
                <section>
            <div class="content">
                <div class="content1">

                    <p>Wow see video oli nii lahe</p>

                    <div class="like">
                        <i onclick="changeColor(this, 'green')"
                        class="fa fa-thumbs-up"></i>

                        <i onclick="changeColor(this, 'red')"
                        class="fa fa-thumbs-down"></i>
                    </div>

                </div>
            </div>
        </section>
    

        <div id="myModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                
                <h2>Dislike</h2>
                <p>Miks sulle video ei meeldinud?</p>
                
                <textarea placeholder="Kirjuta siia oma tagasiside..."></textarea>
                
                <div class="saada">
                    <button>Saada</button>
                </div>
            </div>
        </div>
    </header>
    
<script src="script.js"></script>
</body>
</html>
